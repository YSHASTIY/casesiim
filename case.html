<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crate — Открытие кейса</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="noise"></div>
  <div class="cursor-glow"></div>

  <header class="topbar">
    <a class="brand" href="index.html">CR<span>A</span>TE</a>
    <button class="menu-toggle" aria-label="Открыть меню">
      <i class="fa-solid fa-bars"></i>
    </button>
    <nav>
      <a href="index.html">Главная</a>
      <a href="cases.html">Кейсы</a>
      <a href="modes.html">Режимы</a>
      <a href="contracts.html">Контракты</a>
      <a href="upgrade.html">Апгрейд</a>
    </nav>
    <div class="header-actions">
      <button class="balance">
        <i class="fa-solid fa-gem"></i>
        <b data-balance>2 450</b>
      </button>
      <button class="topup" aria-label="Получить игровые кристаллы">
        <i class="fa-solid fa-plus"></i><span>Кристаллы</span>
      </button>
      <a class="avatar" href="profile.html">M</a>
    </div>
  </header>

  <!-- Лайв-лента -->
  <div class="live-drops-container">
    <div class="live-drops-header">
      <span class="eyebrow">ПУЛЬС ПЛАТФОРМЫ</span>
      <span class="live-dot">LIVE</span>
    </div>
    <div class="drops-wrap">
      <div class="drops" data-drops></div>
    </div>
  </div>

  <main class="inner">
    <div class="breadcrumbs">
      <a href="index.html">Главная</a>
      / <a href="cases.html">Кейсы</a>
      / <span data-case-name>Aurora</span>
    </div>

    <section class="opening">
      <div class="opening-info">
        <span class="eyebrow">LIMITED SERIES</span>
        <h1 data-case-title>Aurora</h1>
        <p>Холодная коллекция для тех, кто играет с характером. Внутри — 12 предметов, от редких до легендарных.</p>
        <div class="price">
          <i class="fa-solid fa-gem"></i>
          <span data-case-price>99</span> кристаллов
        </div>
        <div class="open-count">
          <label>Количество открытий:</label>
          <div class="count-buttons">
            <button class="count-btn active" data-count="1">1</button>
            <button class="count-btn" data-count="2">2</button>
            <button class="count-btn" data-count="3">3</button>
            <button class="count-btn" data-count="4">4</button>
            <button class="count-btn" data-count="5">5</button>
          </div>
        </div>
        <div class="total-price">
          Итого: <span data-total-price>99</span> кристаллов
        </div>
      </div>
      <div class="roulette-panel">
        <div class="roulettes-container" data-roulettes></div>
        <div class="fast-open-wrapper">
          <button class="button primary spin">
            <i class="fa-solid fa-play"></i>
            Открыть <span data-case-name-btn>Aurora</span>
          </button>
          <button type="button" class="button ghost fast-open-btn" id="fastOpenBtn">
            <i class="fa-solid fa-bolt"></i>
            Быстрое открытие
          </button>
        </div>
      </div>
    </section>

    <section class="section probabilities">
      <div class="section-heading">
        <div>
          <span class="eyebrow">ПРОЗРАЧНЫЕ ШАНСЫ</span>
          <h2>Что может выпасть</h2>
        </div>
      </div>
      <div class="items" data-items></div>
    </section>
  </main>

  <div class="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/roulette.js"></script>
  <link rel="stylesheet" href="css/roulette-fix.css">
</body>
</html>
