<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crate — Лидеры</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">CR<span>A</span>TE</a>
    <nav>
      <a href="index.html">Главная</a>
      <a href="case.html">Кейсы</a>
      <a href="modes.html">Режимы</a>
      <a href="contracts.html">Контракты</a>
      <a href="upgrade.html">Апгрейд</a>
      <a class="active" href="leaderboard.html">Лидеры</a>
    </nav>
    <div class="header-actions">
      <a class="avatar" href="profile.html">M</a>
    </div>
  </header>

  <main class="inner">
    <div class="page-title">
      <div>
        <span class="eyebrow">СЕЗОН 09</span>
        <h1>Таблица лидеров</h1>
      </div>
    </div>

    <div class="leader-podium">
      <article>
        <b>02</b>
        <i>V</i>
        <h3>Vortex</h3>
        <span>18 420 кристаллов</span>
      </article>
      <article class="first">
        <b>01</b>
        <i>A</i>
        <h3>Artemis</h3>
        <span>24 890 кристаллов</span>
      </article>
      <article>
        <b>03</b>
        <i>N</i>
        <h3>NeonFox</h3>
        <span>15 760 кристаллов</span>
      </article>
    </div>

    <div class="leader-list" data-leaders></div>
  </main>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var names = ['Maverick', 'Tetra', 'Maya', 'Ghostline', 'Kaito', 'Sven', 'Volt'];
      var list = document.querySelector('[data-leaders]');
      if (list) {
        list.innerHTML = names.map(function(name, i) {
          return '<article>' +
            '<b>#' + (i + 4) + '</b>' +
            '<i>' + name[0] + '</i>' +
            '<strong>' + name + '</strong>' +
            '<span>ур. ' + (36 - i) + '</span>' +
            '<em>' + (10840 - i * 731).toLocaleString('ru-RU') + ' <small>◆</small></em>' +
            '</article>';
        }).join('');
      }
    });
  </script>
</body>
</html>
