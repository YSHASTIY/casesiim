<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crate — Профиль</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="noise"></div>
  <div class="cursor-glow"></div>

  <header class="topbar">
    <a class="brand" href="index.html">CR<span>A</span>TE</a>
    <button class="menu-toggle" aria-label="Открыть меню">
      <i class="fa-solid fa-bars"></i>
    </button>
    <nav>
      <a href="index.html">Главная</a>
      <a href="cases.html">Кейсы</a>
      <a href="modes.html">Режимы</a>
      <a href="contracts.html">Контракты</a>
      <a href="upgrade.html">Апгрейд</a>
    </nav>
    <div class="header-actions">
      <button class="balance">
        <i class="fa-solid fa-gem"></i>
        <b data-balance>2 450</b>
      </button>
      <button class="topup" aria-label="Получить игровые кристаллы">
        <i class="fa-solid fa-plus"></i><span>Кристаллы</span>
      </button>
    </div>
  </header>

  <!-- Лайв-лента -->
  <div class="live-drops-container">
    <div class="live-drops-header">
      <span class="eyebrow">ПУЛЬС ПЛАТФОРМЫ</span>
      <span class="live-dot">LIVE</span>
    </div>
    <div class="drops-wrap">
      <div class="drops" data-drops></div>
    </div>
  </div>

  <main class="inner">
    <section class="profile-hero">
      <div class="profile-avatar">M</div>
      <div>
        <span class="eyebrow">ПРОФИЛЬ ИГРОКА</span>
        <h1>Maverick</h1>
        <p>Уровень 37 <i class="fa-solid fa-circle-check"></i></p>
      </div>
      <div class="profile-stats">
        <div>
          <b>243</b>
          <span>открыто кейсов</span>
        </div>
        <div>
          <b>4 890</b>
          <span>стоимость инвентаря</span>
        </div>
        <div>
          <b>★ Karambit</b>
          <span>лучший дроп</span>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-heading">
        <div>
          <span class="eyebrow">МОЯ КОЛЛЕКЦИЯ</span>
          <h2>Инвентарь <small data-inventory-count>0 предметов</small></h2>
        </div>
        <div class="inventory-value">
          <span>Стоимость</span>
          <b><i class="fa-solid fa-gem"></i> <span data-inventory-value>0</span></b>
          <button class="button primary sell-all-inventory" type="button">Продать всё</button>
        </div>
      </div>
      <div class="inventory-grid" data-inventory></div>
    </section>
  </main>

  <div class="toast"></div>

  <script src="js/app.js"></script>
  <script src="js/inventory.js"></script>
</body>
</html>
